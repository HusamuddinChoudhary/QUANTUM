services:
  # -------------------------
  # BACKEND: FastAPI Service
  # -------------------------
  - type: web
    name: quantum-ares-backend
    env: python
    region: ohio
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn saas_platform.backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Add any other required backend secrets here (e.g., OPENAI_API_KEY)

  # -------------------------
  # FRONTEND: Static Site
  # -------------------------
  - type: static_site
    name: quantum-ares-frontend
    region: ohio
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: quantum-ares-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      # Redirect all 404s to index.html for React Router to handle
      - type: rewrite
        source: /*
        destination: /index.html
