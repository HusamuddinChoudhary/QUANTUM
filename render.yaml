# FRONTEND: React (Vite)
- type: static
  name: quantum-ares-frontend
  region: ohio
  plan: free
  buildCommand: npm install && npm run build
  staticPublishPath: dist

  envVars:
    - key: VITE_API_URL
      fromService:
        type: web
        name: quantum-ares-backend
        envVarKey: RENDER_EXTERNAL_URL

  routes:
    - type: rewrite
      source: /*
      destination: /index.html